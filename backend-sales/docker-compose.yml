version: '3.8'

services:
  # server 1
  backend1:
    build: .
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - redis

  # server 2
  backend2:
    build: .
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - redis

  # server 3
  backend3:
    build: .
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - redis

  # redis — broker untuk queue (job background)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # queue worker — SATU instance saja, memproses job dari Redis.
  # Pakai build/image & .env yang sama dengan backend.
  queue-worker:
    build: .
    env_file: .env
    restart: unless-stopped
    volumes:
      - .:/app
    command: php artisan queue:work redis --tries=3 --backoff=5
    depends_on:
      - redis

  # traefik
  traefik:
    image: traefik:v3.7
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # load balancer
  loadbalancer:
    image: nginx:alpine
    ports:
      - "8888:80" 
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend1
      - backend2
      - backend3

  # frontend
  frontend_service:
    build: ../frontend-sales 
    ports:
      - "5173:5173"
    volumes:
      - ../frontend-sales:/app
      - /app/node_modules
    depends_on:
      - loadbalancer

  minio:
    image: minio/minio
    ports:
      - "9000:9000" # Laravel (API)
      - "9001:9001" # Dashboard Web
    environment:
      - MINIO_ROOT_USER=adminnexus
      - MINIO_ROOT_PASSWORD=adminnexus123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
  redis_data: