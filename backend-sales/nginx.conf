events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 3 node PHP-FPM (round-robin). FPM listen di :9000.
    upstream laravel_fpm {
        server backend1:9000;
        server backend2:9000;
        server backend3:9000;
    }

    server {
        listen 80;

        # Kode di-mount read-only ke container LB agar try_files & $document_root
        # resolve dengan benar. Path ini SAMA dengan di container FPM (/app) sehingga
        # SCRIPT_FILENAME yang dikirim valid di sisi FPM.
        root  /app/public;
        index index.php;

        location / {
            # CORS preflight: jawab langsung, jangan diteruskan ke FPM
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept, Authorization, X-Requested-With' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Length' 0;
                return 204;
            }

            # Semua request (API Laravel) diarahkan ke front controller index.php
            try_files $uri /index.php?$query_string;
        }

        location ~ \.php$ {
            # Bagi rata ke 3 FPM
            fastcgi_pass laravel_fpm;
            fastcgi_index index.php;
            include fastcgi_params;

            # SCRIPT_FILENAME harus path valid DI DALAM container FPM (/app/public/...)
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            # Teruskan Bearer token agar Sanctum tetap menerima Authorization header
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;

            # Buang header CORS bawaan Laravel (HandleCors) agar TIDAK duplikat —
            # Nginx jadi satu-satunya sumber CORS. Duplikat ACAO bikin browser menolak.
            fastcgi_hide_header 'Access-Control-Allow-Origin';
            fastcgi_hide_header 'Access-Control-Allow-Methods';
            fastcgi_hide_header 'Access-Control-Allow-Headers';
            fastcgi_hide_header 'Vary';

            # CORS pada respons sebenarnya (satu sumber, dari Nginx)
            add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept, Authorization, X-Requested-With' always;

            # Bukti node mana yang melayani (load balancing)
            add_header X-Served-By $upstream_addr always;
        }
    }
}
