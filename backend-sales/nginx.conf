events {
    worker_connections 1024;
}

http {
    # Daftar 3 kembaran server Laravel kita
    upstream laravel_cluster {
        server backend1:8000;
        server backend2:8000;
        server backend3:8000;
    }

    server {
        listen 80;

        location / {
            # === CORS HANDLER ===
            # Tangani preflight OPTIONS yang dikirim browser sebelum POST/PUT/DELETE
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept, Authorization, X-Requested-With' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Length' 0;
                return 204;
            }

            # Sembunyikan CORS header dari Laravel agar tidak duplikat
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';
            proxy_hide_header 'Vary';

            # Tambahkan header CORS dari Nginx (satu sumber saja)
            add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept, Authorization, X-Requested-With' always;

            proxy_pass http://laravel_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Bukti server mana yang merespons
            add_header X-Served-By $upstream_addr always;
        }
    }
}