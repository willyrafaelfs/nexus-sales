; OPcache — cache bytecode PHP agar tidak recompile tiap request (percepatan besar).
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=12000

; validate_timestamps=0: OPcache TIDAK stat file tiap request — bytecode dilayani
; murni dari memori. Ini krusial di Docker Desktop (Windows/Mac) yang bind-mount-nya
; lambat; tanpa ini, stat ribuan file framework tiap request bikin bootstrap ~2-4 detik.
; KONSEKUENSI: perubahan kode tidak terbaca sampai FPM di-reload:
;   docker compose restart backend1 backend2 backend3   (atau opcache_reset)
opcache.validate_timestamps=0
